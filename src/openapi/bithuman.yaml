            schema:
              type: object
              required: [text, base_voice]
              properties:
                text:
                  type: string
                  example: "Tuned voice preview."
                base_voice:
                  type: string
                  description: Built-in voice ID (`M1`-`F5`) to edit.
                  example: "F1"
                axes:
                  type: object
                  description: Optional map of axis-name → float value. Omit to preview the unedited base voice.
                  additionalProperties:
                    type: number
                  example:
                    pitch: 0.15
                    brightness: -0.10
                language:
                  type: string
                  default: "en"
      responses:
        "200":
          description: Audio bytes (WAV).
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

