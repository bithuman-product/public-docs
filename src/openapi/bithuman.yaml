openapi: 3.1.0
info:
  title: bitHuman
  version: "1.0"
  contact:
    name: bitHuman Support
    url: https://discord.gg/ES953n7bPA
  x-logo:
    url: https://docs.bithuman.ai/images/bithuman-logo.png
  description: |
    Real-time, lip-synced AI avatars. Audio in, talking video out at
    25 FPS with sub-200 ms latency. Render on the cloud, on-device, or
    in the browser — one engine, one `.imx` file.

    ```bash
    # 30-second demo — no install, no SDK
    curl -X POST https://api.bithuman.ai/v1/tts \
      -H "api-secret: $BITHUMAN_API_SECRET" \
      -H "content-type: application/json" \
      -d '{"text": "Hello from bitHuman.", "voice": "F1"}' \
      --output hello.wav
    ```

    Get a free API secret at
    [bithuman.ai → Developer → API Keys](https://www.bithuman.ai/#developer),
    then [walk the 2-minute Quickstart →](#tag/quickstart) or jump
    straight into the [endpoints →](#tag/authentication-api).

    ## What you can build

    - **Voice-only chat** — call `/v1/tts` or `/v1/audio/speech`
      (OpenAI-compatible drop-in) to synthesize speech in 31 languages.
    - **Animated avatars** — create an agent in the dashboard, then
      `POST /v1/agent/{code}/speak` to make it talk.
    - **Generate new avatars** — `POST /v1/agent-generation` from a
      prompt or your own portrait + voice samples.
    - **Embed in any app** — REST from any language, native SDKs in
      Python / Swift / Kotlin, drop-in LiveKit plugin for voice agents,
      Docker image for self-hosted GPU.

    ## How auth works

    Every request sends an `api-secret` header. The API exchanges it
    for a short-lived runtime token (auto-renewed each minute via a
    heartbeat) — your raw secret is never sent to the avatar renderer,
    only to `api.bithuman.ai` over TLS.

    All endpoints are relative to `https://api.bithuman.ai`.
    [Full auth flow →](#tag/auth-guide)

servers:
  - url: https://api.bithuman.ai
    description: Production

security:
  - apiSecret: []

paths:
  /v1/validate:
    post:
      operationId: validateApiSecret
      summary: Validate API secret
      description: Verify that your API secret is valid and your account is active.
      tags: [Authentication]
      responses:
        "200":
          description: API secret is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/agent/generate:
    post:
      operationId: generateAgent
      summary: Generate a new agent
      description: |
        Create a new avatar agent from a text prompt, with optional image,
        video, and audio assets. Generation takes 2-5 minutes. Poll
        `/v1/agent/status/{agent_id}` to check progress.
      tags: [Agent Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: System prompt / personality for the agent. If omitted, a random default is used.
                  example: "You are a friendly fitness coach who motivates users."
                image:
                  type: string
                  description: URL to a face image for avatar appearance.
                  example: "https://example.com/face.jpg"
                video:
                  type: string
                  description: URL to a video for avatar appearance and mannerisms.
                  example: "https://example.com/clip.mp4"
                audio:
                  type: string
                  description: URL to audio for voice cloning.
                  example: "https://example.com/voice.wav"
                aspect_ratio:
                  type: string
                  enum: ["16:9", "9:16", "1:1"]
                  default: "16:9"
                  description: Aspect ratio for image generation.
                video_aspect_ratio:
                  type: string
                  enum: ["16:9", "9:16", "1:1"]
                  default: "16:9"
                  description: Aspect ratio for video generation.
                agent_id:
                  type: string
                  description: Custom agent identifier. Auto-generated if omitted.
                duration:
                  type: integer
                  default: 10
                  description: Source video duration in seconds.
      responses:
        "200":
          description: Generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Agent generation started"
                  agent_id:
                    type: string
                    example: "A91XMB7113"
                  status:
                    type: string
                    example: "processing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/agent/status/{agent_id}:
    get:
      operationId: getAgentStatus
      summary: Get agent generation status
      description: |
        Poll this endpoint to check generation progress. Status transitions:
        `processing` → `ready` (success) or `failed` (error).
        Recommended polling interval: 5 seconds.
      tags: [Agent Generation]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      agent_id:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      status:
                        type: string
                        enum: [processing, ready, failed, generating, completed]
                      system_prompt:
                        type: string
                      image_url:
                        type: string
                      video_url:
                        type: string
                      model_url:
                        type: string
                        description: URL to download the .imx model file (when status is ready).
                      voice_id:
                        type: string
                      progress:
                        type: number
                        format: float
                        minimum: 0
                        maximum: 1
                        description: Generation progress as a fraction from 0.0 to 1.0.
                      progress_msg:
                        type: string
                        description: Human-readable progress description.
                      current_step:
                        type: string
                        description: Current generation step name.
                      event_type:
                        type: string
                        description: Most recent event (e.g. "lip_created").
                      error_message:
                        type: string
                        description: Error details if status is "failed".
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{code}:
    get:
      operationId: getAgent
      summary: Get agent details
      description: Retrieve full details for an agent by its code.
      tags: [Agent Management]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Agent"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: updateAgent
      summary: Update agent
      description: Update an agent's system prompt.
      tags: [Agent Management]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                system_prompt:
                  type: string
                  description: New system prompt for the agent.
                  example: "You are a professional sales assistant."
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_code:
                    type: string
                    example: "A91XMB7113"
                  updated:
                    type: boolean
                    example: true
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{agent_code}/speak:
    post:
      operationId: agentSpeak
      summary: Make agent speak
      description: |
        Send text for the avatar to speak aloud in all active sessions.
        The agent must be in at least one active LiveKit room.
      tags: [Agent Context]
      parameters:
        - name: agent_code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: Text for the avatar to speak.
                  example: "Hello! Welcome to our demo."
                room_id:
                  type: string
                  description: Target a specific room (optional, defaults to all active rooms).
      responses:
        "200":
          description: Speech triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_code:
                    type: string
                    example: "A91XMB7113"
                  context_type:
                    type: string
                    example: "speak"
                  delivered_to_rooms:
                    type: integer
                    example: 1
                    description: Number of active rooms that received the message.
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{agent_code}/add-context:
    post:
      operationId: addContext
      summary: Add context to agent
      description: |
        Inject background knowledge into the agent's context. The avatar
        won't say this aloud, but will use the information in future responses.
      tags: [Agent Context]
      parameters:
        - name: agent_code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context]
              properties:
                context:
                  type: string
                  description: Knowledge to inject.
                  example: "The customer just purchased a premium plan."
                type:
                  type: string
                  enum: [add_context, speak]
                  default: add_context
                  description: "`add_context` for silent knowledge (default), `speak` to trigger verbal response."
                room_id:
                  type: string
                  description: Target a specific room (optional).
      responses:
        "200":
          description: Context added
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_code:
                    type: string
                  context_type:
                    type: string
                  delivered_to_rooms:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/files/upload:
    post:
      operationId: uploadFile
      summary: Upload a file
      description: |
        Upload images, videos, audio, or documents. Files are auto-organized
        by type. Supports URL download or direct base64 upload.
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Upload by URL
                  required: [file_url]
                  properties:
                    file_url:
                      type: string
                      description: Public URL to download the file from.
                      example: "https://example.com/avatar.jpg"
                    file_type:
                      type: string
                      enum: [auto, image, video, audio, document]
                      default: auto
                      description: File type (auto-detected if omitted).
                - type: object
                  title: Upload by base64
                  required: [file_data, file_name]
                  properties:
                    file_data:
                      type: string
                      description: Base64-encoded file data.
                    file_name:
                      type: string
                      description: Original filename with extension.
                      example: "avatar.jpg"
                    file_type:
                      type: string
                      enum: [auto, image, video, audio, document]
                      default: auto
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "File uploaded successfully"
                  data:
                    type: object
                    properties:
                      file_url:
                        type: string
                        description: Public CDN URL of the uploaded file.
                      original_source:
                        type: string
                        description: Original URL or filename.
                      file_type:
                        type: string
                        description: Detected file type category.
                      file_size:
                        type: integer
                        description: File size in bytes.
                      mime_type:
                        type: string
                        description: MIME content type.
                      asset_category:
                        type: string
                        description: Storage category (images, videos, audio, docs).
                      uploaded_at:
                        type: string
                        format: date-time
        "413":
          description: File too large (max 10 MB for images, 100 MB for video)
        "415":
          description: Unsupported file type

  /v2/credit-summaries:
    get:
      operationId: getCreditSummaries
      summary: Check credit balance
      description: Returns current credit balance, plan details, and estimated minutes remaining for each usage type.
      tags: [Billing]
      security:
        - apiSecret: []
      responses:
        "200":
          description: Credit balance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      balance:
                        type: number
                      plan_credits:
                        type: number
                      topup_credits:
                        type: number
                      minutes_estimate:
                        type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/embed-tokens/request:
    post:
      operationId: requestEmbedToken
      summary: Generate embed token
      description: Generate a JWT token for embedding an avatar on a website. Use this from your backend — never expose your API secret in frontend code.
      tags: [Embedding]
      security:
        - apiSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agent_id
              properties:
                agent_id:
                  type: string
                  description: Agent code (e.g. A78WKV4515)
                fingerprint:
                  type: string
                  description: Unique visitor identifier for session tracking
      responses:
        "200":
          description: Token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      sid:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/dynamics/generate:
    post:
      operationId: generateDynamics
      summary: Generate gesture animations
      description: |
        Create gesture animations (wave, nod, smile, laugh, etc.) for an agent.
        These can be triggered during live sessions via keyword mapping.
      tags: [Dynamics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id]
              properties:
                agent_id:
                  type: string
                  example: "A91XMB7113"
                duration:
                  type: integer
                  default: 5
                  description: Gesture duration in seconds.
                model:
                  type: string
                  enum: [quality, speed, auto]
                  default: quality
                  description: Generation model variant.
      responses:
        "200":
          description: Dynamics generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Dynamics generation started"
                  agent_id:
                    type: string
                  status:
                    type: string
                    example: "processing"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/dynamics/{agent_id}:
    get:
      operationId: getDynamics
      summary: Get available gestures
      description: List all available gesture animations for an agent.
      tags: [Dynamics]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      responses:
        "200":
          description: Available gestures
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      agent_id:
                        type: string
                      url:
                        type: string
                        description: Model path or null.
                      status:
                        type: string
                        enum: [ready, generating, processing, failed]
                      gestures:
                        type: object
                        description: Map of gesture name to video URL.
                        additionalProperties:
                          type: string
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateDynamics
      summary: Update dynamics configuration
      description: |
        Update gesture settings for an agent. After a successful update,
        movements regeneration is automatically triggered in the background.
      tags: [Dynamics]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dynamics]
              properties:
                dynamics:
                  type: object
                  description: |
                    Dynamics configuration to merge with existing data.
                    Fields: `enabled` (boolean), `batch_results` (gesture results),
                    `result` (model path/hash when generated), `talking` (default model path/hash).
                  properties:
                    enabled:
                      type: boolean
                      description: Enable or disable dynamics for this agent.
                    batch_results:
                      type: object
                      description: Map of gesture names to video generation results.
                    result:
                      type: object
                      description: Result model path and hash (set when dynamics generation completes).
                    talking:
                      type: object
                      description: Default talking model path and hash (used when dynamics are disabled).
                toggle_enabled:
                  type: boolean
                  description: |
                    `true` to switch agent to dynamics model, `false` to restore default talking model.
      responses:
        "200":
          description: Dynamics updated and movements regeneration triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Dynamics updated successfully and movements regeneration started"
                  agent_id:
                    type: string
                  regeneration_status:
                    type: string
                    enum: [started, failed]
                    description: Whether background movements regeneration was triggered.
                  regeneration_error:
                    type: string
                    description: Error message if regeneration_status is "failed".

  /v1/tts:
    post:
      operationId: synthesizeSpeech
      summary: Synthesize speech from text
      description: |
        Generates audio (WAV or PCM) from a text prompt using one of the
        built-in voices. Supports 31 languages, per-request quality / speed
        tuning, and optional sentence-by-sentence streaming.
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: Text to synthesize (any length; multi-sentence supported).
                  example: "Hello from bitHuman."
                voice:
                  type: string
                  description: Voice ID. Built-in voices are `M1`-`M5` (male) and `F1`-`F5` (female).
                  default: "M1"
                  example: "F1"
                language:
                  type: string
                  description: ISO-2 language code. 31 languages supported.
                  default: "en"
                  example: "en"
                total_steps:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 8
                  description: Denoise step count. `5`=fast/lower quality, `8`=balanced, `12`=highest.
                speed:
                  type: number
                  minimum: 0.7
                  maximum: 2.0
                  default: 1.05
                  description: Playback rate.
                format:
                  type: string
                  enum: [wav, pcm_s16le]
                  default: wav
                  description: Response audio format.
                stream:
                  type: boolean
                  default: false
                  description: If true, returns sentence-chunked length-prefixed PCM frames.
      responses:
        "200":
          description: Audio bytes (WAV or PCM, per request `format`).
          content:
            audio/wav:
              schema:
                type: string
                format: binary
            audio/pcm:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Queue full / service overloaded. Retry with backoff.

  /v1/voices:
    get:
      operationId: listVoices
      summary: List available voices
      description: Returns the catalog of built-in and custom voices.
      tags: [Voice]
      responses:
        "200":
          description: Voice catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  voices:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "F1"
                        kind:
                          type: string
                          enum: [builtin, custom]
                          example: "builtin"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/audio/speech:
    post:
      operationId: openaiCompatSpeech
      summary: OpenAI-compatible speech endpoint
      description: |
        Drop-in compatible with OpenAI's `POST /v1/audio/speech`. Useful for
        migrating existing OpenAI clients to bitHuman without code changes —
        swap the base URL to `https://api.bithuman.ai/v1` and the auth
        header to `api-secret`.
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                model:
                  type: string
                  description: Ignored — bitHuman uses its own TTS model. Pass `"tts-1"` for compatibility.
                  example: "tts-1"
                input:
                  type: string
                  description: Text to synthesize.
                  example: "Hello from bitHuman."
                voice:
                  type: string
                  description: bitHuman voice ID (`M1`-`F5`).
                  default: "M1"
                response_format:
                  type: string
                  enum: [wav]
                  default: wav
                speed:
                  type: number
                  minimum: 0.7
                  maximum: 2.0
                  default: 1.05
      responses:
        "200":
          description: Audio bytes (WAV by default).
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/studio/axes:
    get:
      operationId: listVoiceAxes
      summary: List voice-tuning semantic axes
      description: |
        Returns the available semantic axes (gender, pitch, rate, brightness)
        plus how each built-in voice projects onto them and the suggested
        slider range. Powers the Tune popover in the Voice Playground.
      tags: [Voice]
      responses:
        "200":
          description: Axis catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  axes:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: "pitch"
                        description:
                          type: string
                          example: "Pitch: − lower, + higher"
                        suggested_min:
                          type: number
                          example: -0.28
                        suggested_max:
                          type: number
                          example: 0.28
                        anchor_projections:
                          type: object
                          additionalProperties:
                            type: number
                          description: Per-voice-ID projection onto this axis.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/studio/preview:
    post:
      operationId: previewTunedVoice
      summary: Preview an axis-edited voice
      description: |
        Synthesize a one-off audio clip using a built-in voice edited along
        the semantic axes returned by `GET /v1/studio/axes`. The edited voice
        is ephemeral — it is NOT persisted in the voice catalog.
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, base_voice, axes]
              properties:
                text:
                  type: string
                  example: "Tuned voice preview."
                base_voice:
                  type: string
                  description: Built-in voice ID (`M1`-`F5`) to edit.
                  example: "F1"
                axes:
                  type: object
                  description: Map of axis-name → float value.
                  additionalProperties:
                    type: number
                  example:
                    pitch: 0.15
                    brightness: -0.10
                language:
                  type: string
                  default: "en"
      responses:
        "200":
          description: Audio bytes (WAV).
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    apiSecret:
      type: apiKey
      name: api-secret
      in: header
      description: |
        Your bitHuman API secret. Get one at
        [www.bithuman.ai/#developer](https://www.bithuman.ai/#developer).

  schemas:
    Agent:
      type: object
      properties:
        agent_id:
          type: string
          example: "A91XMB7113"
        name:
          type: string
          example: "Fitness Coach"
        description:
          type: string
        language:
          type: string
        gender:
          type: string
        model:
          type: string
        subject:
          type: string
        system_prompt:
          type: string
          example: "You are a friendly fitness coach."
        image_url:
          type: string
          description: Avatar face image URL.
        video_url:
          type: string
          description: Avatar source video URL.
        model_url:
          type: string
          description: Downloadable .imx model URL.
        voice_id:
          type: string
          description: Voice identifier.
        status:
          type: string
          description: Current agent state.
        event_type:
          type: string
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Generation progress as a fraction from 0.0 to 1.0.
        progress_msg:
          type: string
        current_step:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
