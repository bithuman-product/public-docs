openapi: 3.1.0
info:
  title: bitHuman
  version: "1.0"
  contact:
    name: bitHuman Support
    url: https://discord.gg/ES953n7bPA
  x-logo:
    url: https://docs.bithuman.ai/bithuman-mark.png
  description: |
    Real-time, lip-synced AI avatars. Audio in, talking video out at
    25 FPS with sub-200 ms latency. Render on the cloud, on-device, or
    in the browser — one engine, one `.imx` file.

    <div class="bh-cards">
      <a href="#tag/quickstart" class="bh-card">
        <strong>Quickstart →</strong>
        <span>Your first talking avatar in 2 minutes</span>
      </a>
      <a href="#tag/Voice" class="bh-card">
        <strong>Voice API →</strong>
        <span>TTS in 30+ languages, 10 voices, OpenAI-compatible</span>
      </a>
      <a href="#tag/sdk-python" class="bh-card">
        <strong>Python SDK →</strong>
        <span>pip install bithuman</span>
      </a>
      <a href="#tag/sdk-swift" class="bh-card">
        <strong>Swift SDK →</strong>
        <span>Mac / iPad / iPhone, on-device</span>
      </a>
    </div>

    All endpoints are relative to `https://api.bithuman.ai` and
    require an `api-secret` header.
    [Get a free API secret →](https://www.bithuman.ai/#developer)

    Some routes are intentionally excluded from this reference because
    they are internal or infrastructure — webhook receivers, `/func_*`
    generation internals, health/telemetry, and realtime session
    plumbing. They are not part of the public developer contract and
    may change without notice.

servers:
  - url: https://api.bithuman.ai
    description: Production

security:
  - apiSecret: []

paths:
  /v1/validate:
    post:
      operationId: validateApiSecret
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/validate \
              -H "api-secret: $BITHUMAN_API_SECRET"
            # → {"valid": true}
      summary: Validate API secret
      description: |
        Verify that your API secret is valid and your account is active.

        Always returns HTTP 200. Inspect the `valid` field in the body
        to determine outcome — invalid or missing credentials yield
        `{"valid": false}` rather than a 401.
      tags: [Authentication]
      responses:
        "200":
          description: Validation complete (check the `valid` field)
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true

  /v1/agent/generate:
    post:
      operationId: generateAgent
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/agent/generate \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{
                "prompt": "You are a friendly fitness coach who motivates users.",
                "image": "https://example.com/face.jpg",
                "audio": "https://example.com/voice.wav",
                "model": "auto"
              }'
            # → {"success": true, "agent_id": "A91XMB7113", "status": "processing"}
            # then poll GET /v1/agent/status/A91XMB7113
      summary: Generate a new agent
      description: |
        Create a new avatar agent from a text prompt, with optional image
        and audio assets. Poll `/v1/agent/status/{agent_id}` to check
        progress.

        **Agent creation is image-only.** Provide a portrait `image` (or let
        the prompt generate one) — bitHuman generates a **10-second
        identity video internally**, authored to loop seamlessly (its
        first and last frames match). Video input is not part of the creation
        contract for any model and is being removed platform-wide: do not
        send `video` — as the rollout completes, a request carrying it is
        rejected with `400 VIDEO_INPUT_NOT_SUPPORTED` before anything is
        billed.

        **Creation time depends on `model`** (the second-generation
        models train real per-identity models — don't apply a 5-minute client
        timeout):

        | model | identity input | typical creation time |
        |---|---|---|
        | `essence-1` (default) | image (or generated from prompt) | 2–5 minutes |
        | `expression-1` | image (or generated from prompt) | ~1–2 minutes |
        | `essence-2` | image (or generated from prompt) — a 10-second identity video is generated internally | 45 minutes typical; long builds can take hours — **both Essence 2 models from one creation** |
        | `essence-2-max` | included with every `essence-2` creation — its identity derives from the same internally generated identity video | prepares in seconds; available once the agent is ready |
        | `expression-2` | image (or generated from prompt) | ~45 minutes (30–60) |
        | `auto` | image or prompt (classified automatically) | as the routed model (`essence-2` or `expression-2`) |

        **Picking the right family:** `essence-2` works best for
        photorealistic human figures; `expression-2` works best for
        cartoonish, stylized, animal, creature, or robot characters. Send
        `model: "auto"` to apply this rule automatically — the platform
        classifies your input and records the recommended model either way.

        **Subject requirement (Essence 2 family):** `essence-2` and
        `essence-2-max` require a **photorealistic
        human** subject. The input is classified before anything is billed; a
        cartoon / animal / creature / robot input is rejected with
        `422 MODEL_SUBJECT_MISMATCH` (nothing charged) — use `expression-2`
        for those characters, or send `model: "auto"` to route
        automatically.

        Failures during generation surface as `status: "failed"` with an
        `error_message` on the status endpoint, and the creation credits
        are automatically refunded.
      tags: [Agent Generation]
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
          description: Optional. A unique client-generated key (e.g. a UUID). Retrying with the same key returns the original response instead of starting a second billed job. Keys are retained for 24 hours.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: System prompt / personality for the agent. If omitted, a random default is used.
                  example: "You are a friendly fitness coach who motivates users."
                image:
                  type: string
                  description: URL to a face image for avatar appearance.
                  example: "https://example.com/face.jpg"
                audio:
                  type: string
                  description: URL to audio for voice cloning.
                  example: "https://example.com/voice.wav"
                aspect_ratio:
                  type: string
                  enum: ["16:9", "9:16", "1:1"]
                  default: "16:9"
                  description: Aspect ratio for image generation.
                agent_id:
                  type: string
                  description: Custom agent identifier. Auto-generated if omitted.
                duration:
                  type: integer
                  deprecated: true
                  description: >-
                    **Deprecated — omit it.** The internally generated
                    identity/driver video is standardizing on 10 seconds
                    (authored to loop seamlessly); the parameter is ignored
                    as that rollout completes.
                model:
                  type: string
                  enum: [essence-1, essence-2, essence-2-max, essence-2-quality, expression-1, expression-2, essence, expression, auto]
                  default: essence-1
                  example: "auto"
                  description: >-
                    Avatar runtime model for the generated agent. Public
                    names: `essence-1`, `essence-2`, `expression-1`,
                    `expression-2`. `essence-1` / `expression-1` are available
                    today; **`essence-2` and `expression-2` launched July 10,
                    2026** — creation access opens progressively during the
                    rollout (a still-paused v2 model returns
                    `503 MODEL_NOT_YET_AVAILABLE`, nothing charged).
                    **`essence-2` is the second-generation
                    Essence model** for photorealistic people — one 500-credit
                    creation that runs everywhere from fully on-device (CPU /
                    Apple Neural Engine) up to cloud GPU; bitHuman serves the
                    right way automatically, so you just select `essence-2`.
                    (**`essence-2-max`** is the premium model — the Essence 2
                    gold teacher served directly on L40S-class GPUs for
                    maximum fidelity; its pre-rename name `essence-2-quality`
                    is still accepted as a **deprecated alias** during the
                    2026-07-10 rename migration. The former `essence-2-light`
                    name was consolidated into `essence-2` and is no longer
                    accepted.) **`auto` classifies your input**
                    (the image if provided, else the prompt): a photorealistic
                    person routes to `essence-2` (combined); a cartoon,
                    animal, creature or robot routes to `expression-2` — the
                    family that works best for stylized characters. `auto` must be
                    sent explicitly — an omitted `model` keeps the historical
                    `essence-1` default. `expression-2` is the
                    second-generation expression engine — audio-driven
                    real-time avatar video from a single photo (creation
                    trains a per-identity model, roughly 45 minutes). The bare
                    `essence` and `expression` are **version shorthands** that
                    resolve to the current default of each family
                    (`essence`→`essence-1`, `expression`→`expression-1`).
                    Retired engine names are **no longer accepted** and return
                    `400 VALIDATION_ERROR`. Identity inputs and creation times
                    differ per model — see the endpoint description table and
                    [Essence vs Expression](#tag/models).
      responses:
        "200":
          description: Generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Agent generation started"
                  agent_id:
                    type: string
                    example: "A91XMB7113"
                  status:
                    type: string
                    example: "processing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: >-
            Insufficient credits. Creation is billed **per model** —
            `expression-2` costs 2000 credits; the Essence 2 family
            (`essence-2`, `essence-2-max`) costs 500; `auto` bills the
            routed model's rate (500 or 2000); the v1 families (`essence-1`,
            `expression-1`) cost 250. Top up to continue. Returns error code
            `INSUFFICIENT_BALANCE`.
        "400":
          description: >-
            Body failed validation — malformed JSON, an invalid / retired
            `model` value (`VALIDATION_ERROR` — the message lists the
            accepted model names), or a `video` input
            (`VIDEO_INPUT_NOT_SUPPORTED` — agent creation is image-only; the
            10-second identity video is generated internally so it loops
            seamlessly; this rejection is rolling out platform-wide, so
            never send `video`). Rejected before dispatch; no credits
            charged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                validation_error:
                  summary: Invalid model value
                  value:
                    error:
                      code: "VALIDATION_ERROR"
                      message: "Invalid model 'my-model'; must be one of: auto, essence, essence-1, essence-2, essence-2-max, essence-2-quality, expression, expression-1, expression-2"
                      httpStatus: 400
                    status: "error"
                    status_code: 400
                video_input_not_supported:
                  summary: Video creation input (image-only contract)
                  value:
                    error:
                      code: "VIDEO_INPUT_NOT_SUPPORTED"
                      message: "Agent creation is image-only. Provide a portrait `image`; bitHuman generates a 10-second idle/driver video internally so it loops seamlessly (first frame == last frame). Video input is not accepted for any model (essence-1, expression-1, essence-2, essence-2-max, expression-2)."
                      httpStatus: 400
                    status: "error"
                    status_code: 400
        "422":
          description: >-
            `MODEL_SUBJECT_MISMATCH` — an explicit Essence 2 creation
            (`essence-2`, `essence-2-max`) whose input
            is not a photorealistic human subject. The classifier runs on the
            image if provided, else the prompt, **before anything is billed**
            and before any agent row is created. Use `expression-2` for
            cartoon / animal / creature / robot subjects, or `model: "auto"`
            (which never rejects — it routes instead). A classifier outage never
            blocks creation (the gate fails open).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: "MODEL_SUBJECT_MISMATCH"
                  message: "essence-2 requires a photorealistic human subject; this image looks like a cartoon — use expression-2"
                  httpStatus: 422
                status: "error"
                status_code: 422
        "503":
          description: >-
            `MODEL_NOT_YET_AVAILABLE` — the requested second-generation model
            (`essence-2`, `essence-2-max`, `expression-2`, or `auto`, which
            routes only to them) isn't open for creation on your account yet.
            Essence 2 and Expression 2 launched July 10, 2026 with creation
            access opening progressively — while the rollout completes, a
            paused model returns this code **before any dispatch or charge**.
            The v1 families (`essence-1`, `expression-1`) always work; retry
            the v2 model later.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: "MODEL_NOT_YET_AVAILABLE"
                  message: "expression-2 isn't available for generation yet. Specify 'essence-1' or 'expression-1' to generate now."
                  httpStatus: 503
                status: "error"
                status_code: 503

  /v1/agent/status/{agent_id}:
    get:
      operationId: getAgentStatus
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl https://api.bithuman.ai/v1/agent/status/A91XMB7113 \
              -H "api-secret: $BITHUMAN_API_SECRET"
            # poll every 5 s until data.status is "ready"/"success" (or "failed")
      summary: Get agent generation status
      description: |
        Poll this endpoint to check generation progress. Status values:
        `processing`, `generating`, `completed` (intermediate); `success` /
        `ready` (terminal success); `failed` (terminal error).

        **Keep polling past `generating` and `completed`** — those are
        intermediate states, not terminal. `completed` can appear early (even
        around ~5% `progress`), so do not stop on it. Only `success` / `ready`
        and `failed` mean polling should stop; gate on `progress` reaching
        `1.0` together with a terminal status.

        `current_step` reports the pipeline stage: `payment` (~2%) →
        `persona` (5–15%) → `voice_image` (~20%) → `video` (~45%, the
        internally generated 10-second identity video — models that need
        one) → `lip_sync` (70–99%, the
        model-specific identity step — training/distillation for
        `expression-2` / `essence-2`, so the longest stage) → `done`
        (100%). A rare `essence-1` path reports `awaiting_face_marking`
        (~35%).

        Recommended polling interval: 5 seconds. Size your overall timeout to
        the model: minutes for `essence-1` / `essence-2-max`, ~90 minutes
        for `expression-2`, and up to several hours for `essence-2`.
      tags: [Agent Generation]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      agent_id:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      status:
                        type: string
                        enum: [processing, generating, completed, success, ready, failed]
                      system_prompt:
                        type: string
                      image_url:
                        type: string
                      video_url:
                        type: string
                      model_url:
                        type: string
                        description: URL to download the .imx model file (when status is ready).
                      voice_id:
                        type: string
                      progress:
                        type: number
                        format: float
                        minimum: 0
                        maximum: 1
                        description: Generation progress as a fraction from 0.0 to 1.0.
                      progress_msg:
                        type: string
                        description: Human-readable progress description.
                      current_step:
                        type: string
                        description: >-
                          Current generation step. Known values: `payment`,
                          `persona`, `voice_image`, `video`,
                          `awaiting_face_marking`, `lip_sync`, `done`.
                        example: "lip_sync"
                      supported_models:
                        type: array
                        items: { type: string }
                        description: >-
                          Canonical model families this agent can be launched
                          as right now. Trained families (`expression-2`,
                          `essence-2-light` — the standard `essence-2`'s
                          internal family name) appear once their per-identity
                          model has been generated; `essence-2-quality` (the
                          internal family name for `essence-2-max` until the
                          platform-side rename flip) appears whenever an image
                          exists (prepares on demand). Tier slugs inherit
                          their family.
                        example: ["essence-2-quality", "expression-2"]
                      event_type:
                        type: string
                        description: Most recent event (e.g. "lip_created").
                      error_message:
                        type: string
                        description: Error details if status is "failed".
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{code}:
    get:
      operationId: getAgent
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl https://api.bithuman.ai/v1/agent/A91XMB7113 \
              -H "api-secret: $BITHUMAN_API_SECRET"
      summary: Get agent details
      description: Retrieve full details for an agent by its code.
      tags: [Agent Management]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: updateAgent
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/agent/A91XMB7113 \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"system_prompt": "You are a professional sales assistant."}'
      summary: Update agent prompt
      description: Update an existing agent's system prompt. The agent must already exist (use `POST /v1/agent/generate` to create one).
      tags: [Agent Management]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                system_prompt:
                  type: string
                  description: New system prompt for the agent.
                  example: "You are a professional sales assistant."
      responses:
        "200":
          description: Agent prompt updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_code:
                    type: string
                    example: "A91XMB7113"
                  updated:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAgent
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X DELETE https://api.bithuman.ai/v1/agent/A91XMB7113 \
              -H "api-secret: $BITHUMAN_API_SECRET"
            # → {"success": true, "agent_code": "A91XMB7113", "deleted": true}
      summary: Delete an agent
      description: |
        Permanently delete an agent you own. Stored assets are cleaned up
        best-effort; usage history is retained. Deleting a missing or
        non-owned agent returns 404.
      tags: [Agent Management]
      security:
        - apiSecret: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  agent_code:
                    type: string
                    example: "A91XMB7113"
                  deleted:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{code}/speak:
    post:
      operationId: agentSpeak
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/agent/A91XMB7113/speak \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"message": "Hello! Welcome to our demo."}'
      summary: Make agent speak
      description: |
        Send text for the avatar to speak aloud in all active sessions.
        The agent must be in at least one active LiveKit room.
      tags: [Agent Context]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: Text for the avatar to speak.
                  example: "Hello! Welcome to our demo."
                room_id:
                  type: string
                  description: Target a specific room (optional, defaults to all active rooms).
      responses:
        "200":
          description: Speech triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_code:
                    type: string
                    example: "A91XMB7113"
                  context_type:
                    type: string
                    example: "speak"
                  delivered_to_rooms:
                    type: integer
                    example: 1
                    description: Number of active rooms that received the message.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{code}/add-context:
    post:
      operationId: addContext
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/agent/A91XMB7113/add-context \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"context": "The customer just purchased a premium plan."}'
      summary: Add context to agent
      description: |
        Inject background knowledge into the agent's context. The avatar
        won't say this aloud, but will use the information in future responses.
      tags: [Agent Context]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context]
              properties:
                context:
                  type: string
                  description: Knowledge to inject.
                  example: "The customer just purchased a premium plan."
                type:
                  type: string
                  enum: [add_context, speak]
                  default: add_context
                  description: "`add_context` for silent knowledge (default), `speak` to trigger verbal response."
                room_id:
                  type: string
                  description: Target a specific room (optional).
      responses:
        "200":
          description: Context added
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_code:
                    type: string
                  context_type:
                    type: string
                  delivered_to_rooms:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/agent/{code}/models:
    post:
      operationId: addAgentModel
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/agent/A91XMB7113/models \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"model": "expression-2"}'
            # → {"success": true, "status": "processing", ...} — poll
            #   GET /v1/agent/status/A91XMB7113 until supported_models lists it
      summary: Add a model to an existing agent
      description: |
        Add an avatar model to an agent you already created — no need to
        re-create the agent or regenerate its persona/voice/image. The agent
        must be in the `ready` state (else `409 AGENT_NOT_READY`).

        | model | what happens | prerequisites | credits | time |
        |---|---|---|---|---|
        | `expression-1` | **instant enablement** — the v1 engine drives the agent's existing image + voice at runtime; nothing is trained | stored image + voice | **0** | immediate (this response) |
        | `expression-2` | trains the per-identity Expression 2 model from the stored image | stored image | 2000 | ~10–45 min |
        | `essence-2` | the **combined** add: trains the standard Essence 2 from the agent's stored identity video (generated internally at creation); Essence 2 Max becomes available from the same video at no extra charge | stored identity video (else `422`) + photorealistic-human subject (else `422 MODEL_SUBJECT_MISMATCH`) | 500 | 45 min–3 h |
        | `essence-1` | builds the v1 `.imx` from the agent's stored identity video (or generates one internally from the stored image) | stored identity video or image | 250 | ~10–20 min |

        Asynchronous adds return `status: "processing"` — poll
        [`GET /v1/agent/status/{agent_id}`](#tag/Agent-Generation/operation/getAgentStatus)
        until `supported_models` contains the new family (`essence-2` adds
        both internal family names, `essence-2-light` and
        `essence-2-quality`). Charges are refunded
        automatically if the add fails; re-POSTing the same model never
        double-charges, and returns `status: "ready"` with `credits: 0` once
        the model already exists.
      tags: [Agent Management]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: "A91XMB7113"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                  enum: [essence-1, essence-2, expression-1, expression-2]
                  description: >-
                    The model to add. The Essence 2 tiers are not individually
                    addable — `essence-2` is the one combined add (Light train
                    + Quality from the same identity video). Anything else
                    returns `400 VALIDATION_ERROR` listing these options.
                  example: "expression-2"
      responses:
        "200":
          description: >-
            Model added (`status: "ready"` — instant/already available) or the
            add started (`status: "processing"` — poll supported_models).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  agent_id:
                    type: string
                  model:
                    type: string
                  status:
                    type: string
                    enum: [ready, processing]
                  credits:
                    type: integer
                    description: Credits charged for this add (0 for instant enablement / already available).
                  supported_models:
                    type: array
                    items:
                      type: string
                    description: The agent's launchable model families at response time.
                  message:
                    type: string
        "400":
          description: Invalid `model` (the message lists the addable options).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            `AGENT_NOT_READY` — the agent is still generating or failed;
            models can only be added to a ready agent.
        "422":
          description: >-
            `MODEL_PREREQUISITE_MISSING` — the agent lacks a stored asset the
            model needs (e.g. `essence-2` needs the agent's stored identity
            video — generated internally by Essence creations, never
            uploaded), or
            `MODEL_SUBJECT_MISMATCH` — the Essence 2 family requires a
            photorealistic human subject and the stored image is a
            cartoon/animal/creature/robot (use `expression-2`).
        "503":
          description: >-
            `MODEL_NOT_YET_AVAILABLE` — adding a second-generation model
            (`essence-2`, `expression-2`) isn't open on your account yet;
            creation access is opening progressively since the July 10, 2026
            launch. Rejected before any charge — retry later. Adding the v1
            models always works.

  /v1/agent/{code}/model/download:
    get:
      operationId: downloadAgentModel
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            # 302 redirect to the artifact — -LOJ follows it and keeps the filename
            curl -LOJ "https://api.bithuman.ai/v1/agent/A17ZTB0222/model/download?model=expression-2" \
              -H "api-secret: $BITHUMAN_API_SECRET"
            # → A17ZTB0222.avatar  (add ?redirect=false for the URL as JSON)
      summary: Download an agent's model artifact
      description: |
        Download the generated model file for an agent you own. The family
        defaults to the agent's own model; override with `?model=<family>`
        (canonical names, legacy names, and runtime tier slugs all fold onto
        their family). Artifact per family:

        | family | artifact |
        |---|---|
        | `essence-1` | `<code>.imx` (the portable IMX container) |
        | `essence-2-light` | `<code>.lebundle.imx` — the standard Essence 2 artifact (unified IMX container, ~350–550 MB; **licensed weights** — local playback requires the runtime license activation flow) |
        | `essence-2-quality` | `<code>.pkl` — the Essence 2 Max artifact (IMX container) |
        | `expression-2` | `<code>.avatar` (CoreML zip — the Mac-runnable form, ~90 MB) |
        | `expression-1` | — not downloadable (renders server-side from the agent's image) → `400 MODEL_NOT_DOWNLOADABLE` |

        The default response is a **302 redirect** to the artifact — the
        public URL for `essence-1`, a **1-hour signed URL** on a private
        bucket for the other families — so `curl -LOJ` and browser anchors
        just work. Pass `?redirect=false` to get the URL as JSON instead.

        The launchability gate doubles as the download gate: a family the
        agent can't be launched as (missing from `supported_models`) returns
        `409 MODEL_NOT_GENERATED`. A family the agent supports whose artifact
        hasn't been published to the download store yet returns
        `404 MODEL_ARTIFACT_NOT_READY` — the message says when to retry;
        **poll on that code**.

        The [bitHuman CLI](https://docs.bithuman.ai/sdk/cli/commands) wraps
        this endpoint: `bithuman pull <AGENT_CODE>` downloads the artifact,
        recognizes its model family, and prints what to do next.
      tags: [Agent Management]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Agent code; the agent must be owned by the caller (else 404).
          example: "A17ZTB0222"
        - name: model
          in: query
          required: false
          schema:
            type: string
            enum: [essence-1, essence-2-light, essence-2-quality, expression-2]
          description: >-
            Artifact family. Defaults to the agent's own model. Public names,
            deprecated aliases and runtime tier slugs (e.g. `essence-2`,
            `essence-2-max`, `essence-2-ane`,
            `expression-2-gpu`) fold onto their family; an unrecognized value
            returns `400 VALIDATION_ERROR` listing the downloadable families.
            The families keep their internal names (`essence-2-max` folds
            onto `essence-2-quality`) until the platform-side rename flip.
          example: "expression-2"
        - name: redirect
          in: query
          required: false
          schema:
            type: string
            enum: ["false", "0", "no"]
          description: >-
            Pass `false` to receive the artifact URL as JSON (below) instead
            of a 302 redirect — for UIs that want to fetch or label first.
      responses:
        "302":
          description: >-
            Redirect to the artifact — a public URL for `essence-1`, a
            1-hour signed URL for the private families. Follow it
            (`curl -LOJ`) to download the file.
          headers:
            Location:
              schema:
                type: string
              description: The artifact URL.
        "200":
          description: With `?redirect=false` — the artifact URL as JSON.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      code:
                        type: string
                        example: "A17ZTB0222"
                      model:
                        type: string
                        description: The resolved canonical family.
                        example: "expression-2"
                      filename:
                        type: string
                        example: "A17ZTB0222.avatar"
                      url:
                        type: string
                        description: The artifact URL (signed, 1-hour TTL, for the private families).
                      expires_in:
                        type: integer
                        nullable: true
                        description: Signed-URL TTL in seconds (3600); `null` for the public essence-1 URL.
                        example: 3600
        "400":
          description: >-
            `VALIDATION_ERROR` — unknown `model` value (the message lists the
            downloadable families), or `MODEL_NOT_DOWNLOADABLE` — the family
            has no per-identity artifact to download (`expression-1` renders
            server-side from the agent's image).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: >-
            `NOT_FOUND` — agent unknown or not owned by this account; or
            `MODEL_ARTIFACT_NOT_READY` — the family is supported but its
            artifact hasn't been published to the download store yet. The
            message says when to retry; poll on this code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: "MODEL_ARTIFACT_NOT_READY"
                  message: "agent A17ZTB0222's expression-2 artifact isn't available for download yet: the Mac-runnable build is paced, typically within the hour"
                  httpStatus: 404
                status: "error"
                status_code: 404
        "409":
          description: >-
            `MODEL_NOT_GENERATED` — the requested family isn't in the agent's
            `supported_models` (same gate as embed/session launch), e.g.
            `agent <code>'s expression-2 model hasn't been generated yet`, or
            an `essence-2-max` request on an agent that has no stored
            identity video (identity videos are generated internally by
            Essence creations — create with, or add, `essence-2` to
            generate one).
        "429":
          description: Rate limited (read bucket) — `RATE_LIMITED`.

  /v1/files/upload:
    post:
      operationId: uploadFile
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/files/upload \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"file_url": "https://example.com/avatar.jpg", "file_type": "image"}'
      summary: Upload a file
      description: |
        Upload images, videos, audio, or documents. Files are auto-organized
        by type. Supports URL download or direct base64 upload.
      tags: [Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Upload by URL
                  required: [file_url]
                  properties:
                    file_url:
                      type: string
                      description: Public URL to download the file from.
                      example: "https://example.com/avatar.jpg"
                    file_type:
                      type: string
                      enum: [auto, image, video, audio, document]
                      default: auto
                      description: File type (auto-detected if omitted).
                - type: object
                  title: Upload by base64
                  required: [file_data, file_name]
                  properties:
                    file_data:
                      type: string
                      description: Base64-encoded file data.
                    file_name:
                      type: string
                      description: Original filename with extension.
                      example: "avatar.jpg"
                    file_type:
                      type: string
                      enum: [auto, image, video, audio, document]
                      default: auto
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "File uploaded successfully"
                  data:
                    type: object
                    properties:
                      file_url:
                        type: string
                        description: Public CDN URL of the uploaded file.
                      original_source:
                        type: string
                        description: Original URL or filename.
                      file_type:
                        type: string
                        description: Detected file type category.
                      file_size:
                        type: integer
                        description: File size in bytes.
                      mime_type:
                        type: string
                        description: MIME content type.
                      asset_category:
                        type: string
                        description: Storage category (images, videos, audio, docs).
                      uploaded_at:
                        type: string
                        format: date-time
        "400":
          description: "`file_url` could not be downloaded — unreachable, non-public, or blocked (`DOWNLOAD_FAILED`); or `file_data` was not valid base64 (`VALIDATION_ERROR`)."
        "413":
          description: File too large (max 10 MB for images, 100 MB for video)
        "415":
          description: Unsupported file type

