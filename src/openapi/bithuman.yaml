    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "Invalid API secret"
            httpStatus:
              type: integer
              example: 401
        status:
          type: string
          example: "error"
        status_code:
          type: integer
