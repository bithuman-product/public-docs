  /v1/studio/preview:
    post:
      operationId: previewTunedVoice
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/studio/preview \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"text": "Tuned voice preview.", "base_voice": "F1", "axes": {"pitch": 0.15}}' \
              --output preview.wav
      summary: Preview an axis-edited voice
      description: |
