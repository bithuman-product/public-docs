  /v1/pricing:
    get:
      operationId: getPricing
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl https://api.bithuman.ai/v1/pricing \
              -H "api-secret: $BITHUMAN_API_SECRET"
      summary: Get credit pricing
      description: >-
        Machine-readable credit pricing for billable operations, so you can
        estimate cost before a call. Authoritative charges are always enforced
        server-side at request time. For forward per-minute realtime estimates
        based on your current balance, see `GET /v2/credit-summaries`
        (`minutes_estimate`).
      tags: [Account]
      responses:
        "200":
          description: Pricing retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      unit:
                        type: string
                        example: "credits"
                      agent_generation:
                        type: object
                        description: >-
                          Agent creation is priced **per model** — read
                          `by_model` (there is no flat rate). `expression-2`
                          costs 2000 credits; the Essence 2 family costs 500
                          (`essence-2` is the combined Essence 2 creation —
                          one 500-credit charge covers both models); the v1
                          families cost 250. `auto` charges the routed
                          model's rate (500 for `essence-2`, 2000 for
                          `expression-2`). Post-generation adds via
                          `POST /v1/agent/{code}/models` charge the same
                          per-model rates (adding `expression-1` is free).
                        properties:
                          unit:
                            type: string
                            example: "credits"
                          by_model:
                            type: object
                            additionalProperties:
                              type: integer
                            description: >-
                              One-time creation cost per canonical `model`
                              value accepted by `POST /v1/agent/generate`.
                              Since the 2026-07-10 rename flip the premium
                              model is keyed `essence-2-max`; the pre-rename
                              `essence-2-quality` spelling is still accepted
                              as a deprecated alias at the same 500 but is no
                              longer advertised.
                            example:
                              essence-1: 250
                              expression-1: 250
                              essence-2-max: 500
                              expression-2: 2000
                              essence-2: 500
                              auto: 2000
                          note:
                            type: string
                      talking_video:
                        type: object
                        properties:
                          unit:
                            type: string
                            example: "credits_per_minute"
                          billing:
                            type: string
                            example: "ceil(minutes) * rate, minimum 1 minute"
                          rates:
                            type: object
                            additionalProperties:
                              type: integer
                            example:
                              essence-1: 8
                              expression-1: 4
                              expression-2: 4
                              essence-2-max: 8
                              essence-2: 4
                      dynamics_generation:
                        type: object
                        properties:
                          flat:
                            type: integer
                            example: 250
                          note:
                            type: string
                      notes:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v2/credit-summaries:
    get:
      operationId: getCreditSummaries
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl https://api.bithuman.ai/v2/credit-summaries \
              -H "api-secret: $BITHUMAN_API_SECRET"
      summary: Check credit balance
      description: |
        Returns the current credit balance, plan details, and estimated minutes
        remaining for each usage type. Always scoped to the **authenticated
        account** (the owner of the `api-secret`) — there is no way to look up
        another user.
      tags: [Billing]
      security:
        - apiSecret: []
      parameters:
        - name: app
          in: query
          required: false
          description: App identifier for multi-app subscription support.
          schema:
            type: string
            default: imaginex
        - name: app_key
          in: query
          required: false
          description: Explicit subscription key for collection-scoped apps. Defaults to the same value as `app`.
          schema:
            type: string
      responses:
        "200":
          description: Credit balance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user_id:
                        type: string
                        description: The authenticated account's UUID.
                      balance:
                        type: number
                        format: float
                        description: Sum of plan + topup + reward credits, returned as a float (e.g. 5910592.0).
                        example: 5910592.0
                      plan_credits:
                        type: number
                        format: float
                      topup_credits:
                        type: number
                        format: float
                      minutes_estimate:
                        type: object
                      is_enterprise:
                        type: boolean
                      isEnterprisePlanUser:
                        type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/embed-tokens/request:
    post:
      operationId: requestEmbedToken
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/embed-tokens/request \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"agent_id": "A78WKV4515", "fingerprint": "9f3c8b1a2d4e5f6789ab"}'
            # → data.token is a 1-hour JWT for the embed widget
      summary: Generate embed token
      description: Generate a JWT token for embedding an avatar on a website. Use this from your backend — never expose your API secret in frontend code.
      tags: [Embedding]
      security:
        - apiSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agent_id
                - fingerprint
              properties:
                agent_id:
                  type: string
                  description: Agent code (e.g. A78WKV4515)
                  example: "A78WKV4515"
                fingerprint:
                  type: string
                  description: Stable per-device hex string used for session tracking and per-visitor rate limiting. Required.
                  example: "9f3c8b1a2d4e5f6789ab"
                model:
                  type: string
                  description: >-
                    Optional. Request a specific avatar model for the embed
                    session — a model name (`essence-1`, `expression-1`,
                    `essence-2`, `essence-2-max`, `expression-2` — the
                    pre-rename `essence-2-quality` is still accepted as a
                    deprecated alias for `essence-2-max`) or a
                    force-tier slug that pins one serving tier
                    (`expression-2-gpu/-cpu/-ane`, `essence-2-gpu/-ane/-cpu`;
                    the legacy `essence-2-light-gpu/-cpu` slugs still pin
                    their tiers, and retired `essence-2-light(-ane)` values
                    route to the `essence-2` chain). This is the **early
                    artifact gate**: if the requested model folds onto the
                    `expression-2` / `essence-2-light` families and the
                    agent's trained per-identity model hasn't been generated
                    yet, the request is rejected `409 MODEL_NOT_GENERATED`
                    instead of failing later at session dispatch. Unknown
                    values return `400 VALIDATION_ERROR` listing the accepted
                    names. Omitted → the agent's own default model.
                  example: "expression-2"
      responses:
        "200":
          description: Token generated. The returned `token` is a JWT (HS256-signed) with a 1-hour TTL.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  status_code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: 1-hour JWT to pass as the `data-token` attribute on the embed widget script tag.
                      sid:
                        type: string
                        description: Session identifier for tracking this embed instance.
                      model:
                        type: string
                        description: The model baked into the token claim (present when `model` was requested).
                      supported_models:
                        type: array
                        items: { type: string }
                        description: >-
                          Canonical model families this agent can be launched
                          as right now (e.g. a ready expression-2 agent lists
                          `expression-2`; an agent with a stored identity
                          video — generated internally by Essence creations —
                          lists `essence-2-quality`, the internal family name
                          for `essence-2-max` until the platform-side rename
                          flip, whose identity prepares on demand from that
                          video). Tier slugs inherit their
                          family and are not listed.
                        example: ["essence-2-quality", "expression-2"]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: >-
            `MODEL_NOT_GENERATED` — the requested `model` folds to a known
            family the agent can't be launched as right now (it is missing
            from the agent's `supported_models`). For the trained families
            (`expression-2` / `essence-2-light`) the message is `agent
            <code>'s <model> model hasn't been generated yet`; for
            `essence-2-max` it means the agent has no stored identity video
            to prepare from — identity videos are generated internally by
            Essence creations (the message keeps the internal
            `essence-2-quality` family name until the platform-side rename
            flip). Add the
            model (`POST /v1/agent/{code}/models`) or create the agent with
            it, then retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: "MODEL_NOT_GENERATED"
                  message: "agent A56ZFX6217's expression-2 model hasn't been generated yet"
                  httpStatus: 409
                status: "error"
                status_code: 409

  /v1/dynamics/generate:
    post:
      operationId: generateDynamics
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
