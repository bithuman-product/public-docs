                    type: string
                  status:
                    type: string
                    example: "processing"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient credits. Dynamics generation costs 250 credits — INSUFFICIENT_BALANCE.
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/dynamics/{agent_id}:
