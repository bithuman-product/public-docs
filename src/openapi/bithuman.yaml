              schema:
                type: object
                properties:
                  voices:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "F1"
                        kind:
                          type: string
                          enum: [builtin, custom]
                          example: "builtin"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/audio/speech:
    post:
      operationId: openaiCompatSpeech
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST https://api.bithuman.ai/v1/audio/speech \
              -H "api-secret: $BITHUMAN_API_SECRET" \
              -H "content-type: application/json" \
              -d '{"model": "tts-1", "input": "Hello from bitHuman.", "voice": "M1"}' \
              --output speech.wav
      summary: OpenAI-compatible speech endpoint
      description: |
        Drop-in compatible with OpenAI's `POST /v1/audio/speech`. Useful for
        migrating existing OpenAI clients to bitHuman without code changes —
        swap the base URL to `https://api.bithuman.ai/v1` and the auth
        header to `api-secret`.
      tags: [Voice]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                model:
                  type: string
                  description: Ignored — bitHuman uses its own TTS model. Pass `"tts-1"` for compatibility.
                  example: "tts-1"
                input:
                  type: string
                  description: Text to synthesize.
                  example: "Hello from bitHuman."
                voice:
                  type: string
                  description: bitHuman voice ID (`M1`-`F5`).
                  default: "M1"
                response_format:
                  type: string
                  enum: [wav]
                  default: wav
                speed:
                  type: number
                  minimum: 0.7
                  maximum: 2.0
                  default: 1.05
      responses:
        "200":
          description: Audio bytes (WAV by default).
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/studio/axes:
    get:
      operationId: listVoiceAxes
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
