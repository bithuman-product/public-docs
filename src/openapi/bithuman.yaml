components:
  securitySchemes:
    apiSecret:
      type: apiKey
      name: api-secret
      in: header
      description: |
        Your bitHuman API secret. Get one at
        [www.bithuman.ai/#developer](https://www.bithuman.ai/#developer).

  schemas:
    Agent:
      type: object
      properties:
        code:
          type: string
          description: The agent's short code — the primary identifier used across the platform and the embed/viewer URLs.
          example: "A91XMB7113"
        agent_id:
          type: string
          example: "A91XMB7113"
        name:
          type: string
          example: "Fitness Coach"
        description:
          type: string
        language:
          type: string
        gender:
          type: string
        model:
          type: string
        supported_models:
          type: array
          items: { type: string }
          description: >-
            Canonical model families this agent can be launched as right now
            — `essence-1` when its `.imx` exists, `essence-2-quality` (the
            internal family name for `essence-2-max` until the platform-side
            rename flip) when a
            **stored identity video** exists (generated internally by Essence
            creations; its identity prepares on demand from
            that video), and `essence-2-light` (the standard `essence-2`) /
            `expression-2` once their
            trained per-identity model has been generated. Tier slugs inherit
            their family and are not listed.
          example: ["essence-1", "essence-2-quality"]
        subject:
          type: string
        system_prompt:
          type: string
          example: "You are a friendly fitness coach."
        image_url:
          type: string
          description: Avatar face image URL.
        video_url:
          type: string
          description: >-
            The agent's identity video URL — generated internally at
            creation (10 seconds, authored to loop seamlessly). Read-only
            output; video is never a creation input.
        model_url:
          type: string
          description: Downloadable .imx model URL.
        voice_id:
          type: string
          description: Voice identifier.
        status:
          type: string
          description: Current agent state.
        event_type:
          type: string
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Generation progress as a fraction from 0.0 to 1.0.
        progress_msg:
          type: string
        current_step:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        dynamics:
          type: object
          description: Gesture configuration and available gestures.

    Pagination:
      type: object
      properties:
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
        total:
          type: integer
          description: Total matching rows across all pages.
          example: 137
        has_more:
          type: boolean
          example: true

    UsageEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        activity_type:
          type: string
          example: "bithuman-serve"
        pricing_code:
          type: string
          example: "usage_essence_model_self_hosted"
        app:
          type: string
          example: "imaginex"
        agent_code:
          type: string
          nullable: true
        credits_change:
          type: number
          description: Signed credit delta; usage events are positive credits consumed.
          example: 1
        frames_rendered:
          type: integer
          nullable: true
        room_name:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
          nullable: true
        end_time:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          example: "https://example.com/bithuman/webhook"
        events:
          type: array
          items:
            type: string
          description: Subscribed event types; empty means all.
          example: ["agent.ready", "agent.failed"]
        description:
          type: string
          nullable: true
        active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookWithSecret:
      allOf:
        - $ref: "#/components/schemas/Webhook"
        - type: object
          properties:
            secret:
              type: string
              description: |
                HMAC-SHA256 signing secret, returned **only once** at creation.
                Verify deliveries with
                `sha256 = HMAC(secret, "{X-BitHuman-Timestamp}.{raw_body}")`
                and compare against the `X-BitHuman-Signature` header.
              example: "whsec_60fe3d…"

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
          example: "agent.ready"
        status_code:
          type: integer
          nullable: true
          description: HTTP status returned by your endpoint; null on network error/timeout.
          example: 200
        attempts:
          type: integer
          example: 1
        delivered:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "Invalid API secret"
            httpStatus:
              type: integer
              example: 401
        status:
          type: string
          example: "error"
        status_code:
          type: integer
          example: 401

  responses:
    BadRequest:
      description: Missing required parameter or malformed request. The HTTP status equals `status_code` (400).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "MISSING_PARAM"
              message: "Missing required field: text"
              httpStatus: 400
            status: "error"
            status_code: 400

    Unauthorized:
      description: |
        Authentication failed. `UNAUTHORIZED` when the `api-secret` header is
        present but invalid; `MISSING_AUTH` when it is absent. The HTTP status
        equals `status_code` (401).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Invalid API secret"
              httpStatus: 401
            status: "error"
            status_code: 401

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "NOT_FOUND"
              message: "Agent not found"
              httpStatus: 404
            status: "error"
            status_code: 404

    ValidationError:
      description: Body failed schema validation. The HTTP status equals `status_code` (400).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "Invalid request parameters"
              httpStatus: 400
            status: "error"
            status_code: 400

